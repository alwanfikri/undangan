<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khansa & Fikri</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Opening Screen -->
<div id="opening" class="opening">
  <div class="opening-content">
    <h2>Khansa & Fikri</h2>
    <button id="openBtn">Buka Undangan</button>
  </div>
</div>

<h3 id="guest"></h3>

<section class="hero">
  <h1>Khansa & Fikri</h1>
  <p>We are getting married</p>
  <div id="countdown"></div>
</section>

<section class="details">
  <h2>Akad & Resepsi</h2>
  <p>Sabtu, 13 Juni 2026</p>
  <p>Depok, Jawa Barat</p>
  <a href="https://maps.google.com" target="_blank">Lihat Lokasi</a>
</section>

<section class="rsvp-section">
  <h2>Konfirmasi Kehadiran</h2>

  <form id="rsvpForm">
    <input type="text" id="nama" placeholder="Nama Lengkap" required>

    <select id="kategori">
      <option value="Teman">Teman</option>
      <option value="Rekan Kerja">Rekan Kerja</option>
      <option value="Saudara">Saudara</option>
    </select>

    <select id="kehadiran" required>
      <option value="">Pilih Kehadiran</option>
      <option value="Hadir">Hadir</option>
      <option value="Berhalangan">Berhalangan</option>
    </select>

    <textarea id="ucapan" placeholder="Doa & Ucapan"></textarea>

    <button type="submit">Kirim</button>
  </form>

  <p id="formMessage"></p>
</section>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
